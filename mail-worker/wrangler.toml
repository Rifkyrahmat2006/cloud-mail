name = "cloud-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

[[d1_databases]]
binding = "db"
database_name = "mail"
database_id = "dac46d58-763d-47ec-8009-ed6242295245"

[[kv_namespaces]]
binding = "kv"			#kv绑定名默认不可修改
id = "7a65c7fce9fa43f39a6774e04d03bf63"					#kv数据库id

#(可选)
#[[r2_buckets]]
#binding = "r2"			#r2对象存储绑定名默认不可修改
#bucket_name = "test-email"		#r2对象存储桶的名字

[ai]
binding = "ai"

[assets]
binding = "assets"		#静态资源绑定名默认不可修改
directory = "./dist"	#前端vue项目打包的静态资源存放位置,默认dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]	#每天晚上12点执行每日任务,刷新分析缓存


[vars]
ai_model = ""			#ai模型,不填默认使用@cf/meta/llama-3.1-8b-instruct
analysis_cache = false			#是否开启分析数据缓存
orm_log = false			#是否sql日志
domain = ["cloud-mail.batirexport.workers.dev"]				#邮件域名可可配置多个 示例: ["example1.com","example2.com"]
admin = "admin@batirexport.my.id"				#管理员的邮箱	示例: admin@example.com
jwt_secret = "b7f29a1d-18e2-4d3b-941f-f6b2c97c02fd"			#jwt令牌的密钥,随便填一串字符串

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
